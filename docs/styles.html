:root{--bg:#0e1117;--card:#161b22;--line:#30363d;--tx:#e6edf3;--mut:#8b949e;--acc:#58a6ff}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--tx);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif}
.wrap{max-width:1180px;margin:0 auto;padding:24px}

.tab.on{border-color:var(--acc);color:var(--acc);font-weight:600}
.tab .c{color:var(--mut);font-size:11px;margin-left:6px}
h2{font-size:15px;border-bottom:1px solid var(--line);padding-bottom:6px;margin:24px 0 12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
th{color:var(--mut);font-weight:500}.num{text-align:right;font-variant-numeric:tabular-nums}
.pos{color:#3fb950}.neg{color:#f85149}.reason{color:var(--mut);font-size:12px}
.badge{color:#fff;padding:2px 8px;border-radius:20px;font-size:11px;white-space:nowrap}
.hbadge{color:#fff;padding:3px 10px;border-radius:20px;font-size:12px;margin-left:8px}
.stat{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:6px 0 14px}
.desc{color:var(--mut);font-size:13px;margin-bottom:10px}
canvas{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px;max-height:150px}
.note{color:var(--mut);font-size:12px;margin-top:28px;border-top:1px solid var(--line);padding-top:12px}
.pill{font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:20px;padding:1px 8px;margin-left:6px}
@media(max-width:760px){.grid,.stat{grid-template-columns:repeat(3,1fr)}}

const HB={HEALTHY:'#238636',WEAK:'#b62324',QUIET:'#6e7681'};

// ---- portfolio summary

 `<div class=card><div class=k>${c[0]}</div><div class="v ${typeof c[1]==='string'&&c[1][0]==='₹'?cls(parseFloat(c[1].replace(/[₹,]/g,''))):''}">${c[1]}</div></div>`).join('');

// ---- tabs
let active=ORDER[0];
function tabHTML(){
 return ORDER.map(st=>{
  const j=(JOURNAL.styles||{})[st]||{},s=j.stats||{};
  const n=(SCREENS.styles&&SCREENS.styles[st]||[]).length;
  return `<div class="tab ${st===active?'on':''}" onclick="sel('${st}')">${(meta[st]||{}).title||st}<span class=c>${n} picks · ${s.open||0} open</span></div>`;
 }).join('');
}
function badge(st){const h=(((JOURNAL.styles||{})[st]||{}).stats||{}).health||{};

function tradeRows(sigs){
 if(!sigs||!sigs.length)return '<tr><td colspan=9 class=reason>No current signals.</td></tr>';
 return sigs.map(s=>`<tr><td><b>${s.symbol}</b> <span class=pill>${s.sector||''}</span></td>
  <td class=num>${s.entry}</td><td class=num>${s.sl}</td><td class=num>${s.t1}</td><td class=num>${s.t2}</td>
  <td class=num>${s.rr||'—'}</td><td class=num>${s.qty}</td><td class=num>${s.score}</td>
  <td class=reason>${s.reason}</td></tr>`).join('');
}
const SB={WATCHING:'#6e7681',OPEN:'#1f6feb',T1_HIT:'#9e6a03',CLOSED:'#6e7681'};
function jrnRows(entries){
 if(!entries||!entries.length)return '<tr><td colspan=8 class=reason>No journal entries yet.</td></tr>';
 const ord={OPEN:0,T1_HIT:1,WATCHING:2,CLOSED:3};
 return entries.slice().sort((a,b)=>(ord[a.status]-ord[b.status])||(b.pnl-a.pnl)).map(e=>
  `<tr><td><b>${e.symbol}</b></td>
   <td><span class=badge style="background:${SB[e.status]||'#6e7681'}">${e.status}</span></td>
   <td class=num>${e.entry}</td><td class=num>${e.sl}</td><td class=num>${e.last||'—'}</td>
   <td class=num>${e.qty}</td><td class="num ${cls(e.pnl)}">${fmt(e.pnl)}</td>
   <td class=reason>${e.entry_date?('in '+e.entry_date):''}${e.exit_date?(' → out '+e.exit_date+' @'+e.exit):''} ${e.note||''}</td></tr>`).join('');
}

function render(){
